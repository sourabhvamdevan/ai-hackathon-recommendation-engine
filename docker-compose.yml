
version: '3.8'

services:
 
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bis_backend_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
    networks:
      - bis_network
    restart: always


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bis_frontend_ui
    ports:
      - "5173:5173"
    networks:
      - bis_network
    depends_on:
      - backend
    restart: always

networks:
  bis_network:
    driver: bridge